<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>my Sama ☺︎ </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #186477;
    --plum-deep: #190a50;
    --blush: #e1aeee;
    --gold: #d3af70;
    --cream: #faf3ec;
    --berry: #7197a3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(180deg, var(--plum-deep) 0%, var(--plum) 55%, #4a2740 100%);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* floating soft shapes for ambience */
  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { width: 300px; height: 300px; background: var(--blush); top: -80px; left: -80px; }
  .glow-2 { width: 260px; height: 260px; background: var(--gold); bottom: 10%; right: -60px; }

  .hero {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    z-index: 1;
  }

  .eyebrow {
    font-family: 'Quicksand', sans-serif;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--blush);
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  h1.title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(2.6rem, 8vw, 5rem);
    line-height: 1.05;
    max-width: 14ch;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.4s;
  }

  h1.title em {
    font-style: italic;
    font-weight: 500;
    color: var(--gold);
  }

  .hero p.sub {
    margin-top: 1.4rem;
    font-size: 1.05rem;
    color: var(--blush);
    max-width: 32ch;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.6s;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2.2rem;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(250,243,236,0.55);
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  section {
    position: relative;
    z-index: 1;
    padding: 5rem 1.5rem;
    max-width: 780px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    text-align: center;
    margin-bottom: 0.6rem;
  }

  .section-sub {
    text-align: center;
    color: rgba(250,243,236,0.65);
    font-size: 0.95rem;
    margin-bottom: 3rem;
  }

  /* the jar of reasons */
  .jar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
  }

  .card {
    aspect-ratio: 1 / 1;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 16px;
    backface-visibility: hidden;
    padding: 1rem;
  }

  .card-front {
    background: rgba(250,243,236,0.06);
    border: 1px solid rgba(217,181,120,0.35);
  }

  .card-front .num {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.6rem;
    color: var(--gold);
  }

  .card-back {
    background: var(--berry);
    color: var(--cream);
    transform: rotateY(180deg);
    font-size: 0.92rem;
    line-height: 1.4;
    font-weight: 500;
  }

  /* closing note */
  .note {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    line-height: 1.6;
    color: var(--cream);
    padding-top: 1rem;
  }

  .signature {
    margin-top: 2rem;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 0.8rem;
    color: var(--gold);
  }

  footer {
    text-align: center;
    padding: 3rem 1.5rem 4rem;
    font-size: 0.75rem;
    color: rgba(250,243,236,0.35);
    position: relative;
    z-index: 1;
  }

  #musicToggle {
    position: fixed;
    top: 1.2rem;
    right: 1.2rem;
    z-index: 10;
    background: rgba(250,243,236,0.1);
    border: 1px solid rgba(217,181,120,0.4);
    color: var(--cream);
    font-family: 'Quicksand', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    padding: 0.5rem 0.9rem;
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.3s ease;
  }

  #musicToggle:hover {
    background: rgba(250,243,236,0.2);
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- HERO: edit the greeting + subtitle below -->
  <div class="hero">
    <div class="eyebrow">My love</div>
    <h1 class="title">a little surprize<br><em>for you Samsoomi</em></h1>
    <p class="sub">I made this instead of just texting it to you. Scroll down.</p>
    <div class="scroll-hint">↓ keep going ↓</div>
  </div>

  <!-- MUSIC TOGGLE: put your mp3 file in the same folder as this file and update the src below -->
  <button id="musicToggle" aria-label="Play music">♪ click here bebe ☺ </button>
  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <!-- JAR OF REASONS: edit the text inside each .card-back below -->
  <section>
    <h2 class="section-title">I adore you,</h2>
    <p class="section-sub">tap each one</p>

    <div class="jar-grid" id="jar"></div>
  </section>

  <!-- CLOSING NOTE: edit this message -->
  <section>
    <p class="note">
      "To the love of my life, you always inspire me to do more,
      learn new things and grow better with you"
    </p>
    <p class="signature">— always, Nadia</p>
  </section>

  <footer>بحبك</footer>

  <script>
    // EDIT THESE — one line per reason, keep them short so they fit the card
    const reasons = [
      "the way you say my name",
      "the small deets you remember about me",
      "your loud laugh",
      "how safe I feel telling you anything",
      "How incredibly beautiful you are",
      "your big brainz",
      "The love you have for everyone around you",
      "you, seven hours ahead, still first on my mind",
    ];

    // music toggle — browsers block autoplay with sound, so it starts on click
    const musicBtn = document.getElementById('musicToggle');
    const music = document.getElementById('bgMusic');
    let playing = false;

    musicBtn.addEventListener('click', () => {
      if (playing) {
        music.pause();
        musicBtn.textContent = '♪ play again';
      } else {
        music.play();
        musicBtn.textContent = '♪ pause habibi';
      }
      playing = !playing;
    });

    const jar = document.getElementById('jar');

    reasons.forEach((reason, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front"><span class="num">${String(i + 1).padStart(2, '0')}</span></div>
          <div class="card-face card-back">${reason}</div>
        </div>
      `;
      card.addEventListener('click', () => card.classList.toggle('flipped'));
      jar.appendChild(card);
    });
  </script>

</body>
</html>
